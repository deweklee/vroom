apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: vroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: vroom-worker:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vroom-secrets
                  key: database-url
            - name: NATS_URL
              value: nats://nats:4222
