apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: vroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: vroom-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vroom-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vroom-secrets
                  key: jwt-secret
            - name: NATS_URL
              value: nats://nats:4222
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: vroom
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
