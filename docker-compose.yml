services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vroom
      POSTGRES_PASSWORD: vroom
      POSTGRES_DB: vroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vroom -d vroom"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2
    ports:
      - "4222:4222"
      - "8222:8222"
    # Healthcheck removed: minimal image often lacks wget/curl; NATS is fine if port 4222 is open

volumes:
  postgres_data:
